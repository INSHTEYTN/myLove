<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для моего солнышка ❤️</title>
    <!-- Подключаем Tailwind CSS для красивой верстки -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем изящные шрифты из Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #1b051a 0%, #0a010c 100%);
            overflow-x: hidden;
        }
        .font-script {
            font-family: 'Marck Script', cursive;
        }
        /* Анимация плавного появления текста */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }
        .animate-fade-in {
            animation: fadeInUp 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-500 {
            animation-delay: 0.6s;
        }
        .delay-1000 {
            animation-delay: 1.5s;
        }
        /* Пульсирующее свечение для кнопки звука */
        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 0 0 10px rgba(244, 63, 94, 0.4);
            }
            50% {
                box-shadow: 0 0 20px rgba(244, 63, 94, 0.8);
            }
        }
        .pulse-glow {
            animation: pulseGlow 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen text-gray-100 flex flex-col justify-between items-center relative overflow-hidden select-none">

    <!-- Фоновые мерцающие звёзды -->
    <div class="absolute inset-0 pointer-events-none opacity-40" id="stars-container"></div>

    <!-- Кнопка включения генеративной музыки -->
    <div class="absolute top-6 right-6 z-50">
        <button id="music-btn" class="flex items-center gap-2 bg-white/10 backdrop-blur-md border border-white/20 px-4 py-2 rounded-full text-sm font-medium hover:bg-white/20 transition-all active:scale-95 pulse-glow">
            <span id="music-icon">🎵</span>
            <span id="music-text">Включить романтическую музыку</span>
        </button>
    </div>

    <!-- Интерактивный Canvas для пульсирующего сердца -->
    <div class="w-full flex-grow flex items-center justify-center relative mt-10">
        <canvas id="heart-canvas" class="block cursor-pointer absolute"></canvas>
        <div class="absolute text-center pointer-events-none opacity-60 text-xs text-rose-300/50 animate-pulse bottom-4">
            Нажми на экран, чтобы подарить искорку ✨
        </div>
    </div>

    <!-- Текстовое признание -->
    <div class="w-full max-w-2xl px-6 pb-12 text-center relative z-20">
        <div class="space-y-6">
            <p class="animate-fade-in delay-500 text-pink-100/90 text-lg md:text-xl lg:text-2xl leading-relaxed font-light drop-shadow-md">
                солнышко, я очень рад что ты есть у меня, ведь ты подарила мне новую жизнь. С тобой я чувствую себя самым счастливым человеком)
            </p>
            
            <p class="animate-fade-in delay-1000 font-script text-rose-400 text-4xl md:text-5xl lg:text-6xl tracking-wide pt-2 drop-shadow-[0_0_15px_rgba(244,63,94,0.6)]">
                Ты моя первая и последняя любовь 🥰❤️‍🩹
            </p>
        </div>
    </div>

    <script>
        // Инициализация Canvas
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = Math.min(window.innerWidth, 600);
        let height = canvas.height = Math.min(window.innerHeight * 0.55, 450);

        window.addEventListener('resize', () => {
            width = canvas.width = Math.min(window.innerWidth, 600);
            height = canvas.height = Math.min(window.innerHeight * 0.55, 450);
        });

        // Создание фонового мерцания звёзд
        const starsContainer = document.getElementById('stars-container');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'absolute bg-white rounded-full';
            star.style.width = Math.random() * 2 + 'px';
            star.style.height = star.style.width;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animation = `pulse ${2 + Math.random() * 4}s infinite ease-in-out`;
            star.style.opacity = Math.random();
            starsContainer.appendChild(star);
        }

        // --- Математическая модель сердца ---
        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            return { x, y };
        }

        // Класс трассирующей частицы (трассера)
        class Tracer {
            constructor(offsetAngle) {
                this.angle = offsetAngle;
                this.speed = 0.015 + Math.random() * 0.01;
                this.size = 1.5 + Math.random() * 2;
                this.color = this.getRandomColor();
                this.history = [];
                this.maxHistory = 15 + Math.floor(Math.random() * 15);
            }

            getRandomColor() {
                const colors = [
                    'rgba(244, 63, 94, ',  // Розовый/Красный
                    'rgba(236, 72, 153, ', // Насыщенный розовый
                    'rgba(217, 70, 239, ', // Пурпурный
                    'rgba(251, 113, 133, ' // Светло-розовый
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update(pulseScale) {
                this.angle += this.speed;
                if (this.angle > Math.PI * 2) {
                    this.angle = 0;
                }

                const basePos = getHeartPoint(this.angle);
                const scale = (Math.min(width, height) / 40) * pulseScale;
                const targetX = width / 2 + basePos.x * scale;
                const targetY = height / 2.1 + basePos.y * scale;

                this.history.push({ x: targetX, y: targetY });
                if (this.history.length > this.maxHistory) {
                    this.history.shift();
                }
            }

            draw() {
                if (this.history.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }
                
                ctx.strokeStyle = this.color + '0.6)';
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                const head = this.history[this.history.length - 1];
                ctx.beginPath();
                ctx.arc(head.x, head.y, this.size + 1.5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowColor = this.color + '1)';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Класс искры (взрыв при клике/касании)
        class Sparkle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = 0.015 + Math.random() * 0.02;
                this.size = 1 + Math.random() * 3;
                this.color = Math.random() > 0.5 ? '#f43f5e' : '#fda4af';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.life -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        const tracersCount = 75;
        const tracers = [];
        for (let i = 0; i < tracersCount; i++) {
            tracers.push(new Tracer((i / tracersCount) * Math.PI * 2));
        }

        const sparkles = [];

        let time = 0;
        function getPulseScale() {
            time += 0.04;
            const heartbeat = Math.sin(time) * 0.6 + Math.sin(time * 2) * 0.4;
            return 1 + Math.max(0, heartbeat) * 0.12;
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 1, 12, 0.18)';
            ctx.fillRect(0, 0, width, height);

            const pulseScale = getPulseScale();

            ctx.globalCompositeOperation = 'screen';
            tracers.forEach(tracer => {
                tracer.update(pulseScale);
                tracer.draw();
            });
            ctx.globalCompositeOperation = 'source-over';

            for (let i = sparkles.length - 1; i >= 0; i--) {
                const s = sparkles[i];
                s.update();
                if (s.life <= 0) {
                    sparkles.splice(i, 1);
                } else {
                    s.draw();
                }
            }

            requestAnimationFrame(animate);
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 25; i++) {
                sparkles.push(new Sparkle(x, y));
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            createExplosion(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            createExplosion(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        window.onload = function() {
            animate();
        };

        // --- НОВЫЙ ГЕНЕРАТОР РОМАНТИЧЕСКОЙ МУЗЫКИ (Web Audio API) ---
        let audioCtx = null;
        let isPlaying = false;
        let scheduleTimer = null;
        let currentChordIndex = 0;

        // Романтическая прогрессия аккордов: Cmaj7 - Am9 - Fmaj7 - G6
        const chords = [
            [130.81, 196.00, 246.94, 261.63, 329.63, 392.00], // Cmaj7 (C3, G3, B3, C4, E4, G4)
            [110.00, 164.81, 220.00, 261.63, 329.63, 440.00], // Am9 (A2, E3, A3, C4, E4, A4)
            [87.31,  130.81, 174.61, 218.08, 261.63, 349.23], // Fmaj7 (F2, C3, F3, A3, C4, F4)
            [98.00,  146.83, 196.00, 246.94, 293.66, 392.00]  // G6 (G2, D3, G3, B3, D4, G4)
        ];

        // Романтические мелодические ноты (Пентатоника C-Major с нежными переходами)
        const melodyNotes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00];

        // 1. Создание фонового мягкого "синтезаторного" пад-аккорда
        function playWarmPad(chordFreqs) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const duration = 5.0; // Длительность звучания аккорда

            chordFreqs.forEach((freq, index) => {
                // Создаем осцилляторы для каждой ноты аккорда
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();

                // Используем мягкую треугольную волну
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, now);
                // Слегка расстраиваем ноты для живого и глубокого "хорус" звучания
                osc.detune.setValueAtTime((Math.random() - 0.5) * 12, now); 

                filter.type = 'lowpass';
                // Очень мягкий фильтр для бархатного звука
                filter.frequency.setValueAtTime(400, now);
                filter.frequency.exponentialRampToValueAtTime(200, now + duration);

                // Плавная романтичная атака (аккорд разгоняется медленно)
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.04, now + 2.0); // Медленное нарастание
                gainNode.gain.setValueAtTime(0.04, now + duration - 2.0);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration); // Очень медленный спад

                osc.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                osc.start(now);
                osc.stop(now + duration + 0.1);
            });
        }

        // 2. Создание нежных мерцающих колокольчиков поверх аккорда
        function playRomanticChime() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            // Выбираем красивую ноту из гаммы
            const freq = melodyNotes[Math.floor(Math.random() * melodyNotes.length)];
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            // Синусоидальная волна дает кристально чистый нежный звук
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, now);

            // Настройка деликатного затухания
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.07, now + 0.15); // Мягкое касание струны
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 3.5); // Бесконечное эхо

            // Создаем пространственное эхо (Delay)
            const delay = audioCtx.createDelay();
            delay.delayTime.setValueAtTime(0.5, now); // Полсекунды задержки

            const feedback = audioCtx.createGain();
            feedback.gain.setValueAtTime(0.35, now); // Громкость повторов

            // Эхо-петля
            delay.connect(feedback);
            feedback.connect(delay);

            osc.connect(filter);
            filter.connect(gainNode);

            // Направляем звук в динамики и на линию задержки
            gainNode.connect(audioCtx.destination);
            gainNode.connect(delay);
            delay.connect(audioCtx.destination);

            osc.start(now);
            osc.stop(now + 4.0);
        }

        // 3. Планировщик музыки
        function startMusicScheduler() {
            let lastChordTime = 0;

            function musicLoop() {
                if (!isPlaying) return;
                
                const now = Date.now();

                // Каждые 4.5 секунды меняем фоновый аккорд
                if (now - lastChordTime >= 4500) {
                    const currentChord = chords[currentChordIndex];
                    playWarmPad(currentChord);
                    
                    currentChordIndex = (currentChordIndex + 1) % chords.length;
                    lastChordTime = now;
                }

                // Случайным образом воспроизводим нежный хрустальный колокольчик
                if (Math.random() < 0.6) {
                    playRomanticChime();
                }

                // Шаг планировщика (каждые 1-2 секунды)
                const nextInterval = 1000 + Math.random() * 1200;
                scheduleTimer = setTimeout(musicLoop, nextInterval);
            }
            
            lastChordTime = 0; // Сброс времени при старте
            musicLoop();
        }

        // Обработчик кнопки проигрывания
        const musicBtn = document.getElementById('music-btn');
        const musicIcon = document.getElementById('music-icon');
        const musicText = document.getElementById('music-text');

        musicBtn.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            if (!isPlaying) {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                isPlaying = true;
                startMusicScheduler();
                musicBtn.classList.remove('pulse-glow');
                musicIcon.textContent = '⏸️';
                musicText.textContent = 'Выключить музыку';
            } else {
                clearTimeout(scheduleTimer);
                isPlaying = false;
                musicBtn.classList.add('pulse-glow');
                musicIcon.textContent = '🎵';
                musicText.textContent = 'Включить романтическую музыку';
            }
        });
    </script>
</body>
</html>
